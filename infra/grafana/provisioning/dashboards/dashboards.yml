# Grafana Dashboard Provisioning
# Auto-loads dashboard JSON files from the dashboards directory

apiVersion: 1

providers:
  - name: "SphereVoice"
    orgId: 1
    folder: "SphereVoice"
    type: file
    disableDeletion: false
    editable: true
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
