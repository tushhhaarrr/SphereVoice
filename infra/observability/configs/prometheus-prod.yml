# Prometheus Production Config for SphereVoice Observability Stack
# Scrapes: SphereVoice-backend Container App metrics endpoint
# Storage: local TSDB with 30-day retention (persistent volume)

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: SphereVoice-production
    environment: production

# ── Alerting Rules ──────────────────────────────────────────
rule_files:
  - "/etc/prometheus/alerting-rules.yml"

scrape_configs:
  # Scrape metrics from OTEL Collector (co-located)
  - job_name: "otel-collector"
    static_configs:
      - targets: ["localhost:8889"]
        labels:
          service: "SphereVoice-otel-collector"

  # Scrape business metrics from SphereVoice Backend Container App
  # The backend FQDN is injected via BACKEND_METRICS_TARGET env var
  - job_name: "SphereVoice-backend"
    metrics_path: /metrics
    scrape_interval: 15s
    scrape_timeout: 10s
    static_configs:
      - targets: ["${BACKEND_METRICS_TARGET}"]
        labels:
          service: "SphereVoice-backend"

  # Scrape Prometheus own metrics
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
