services:
  postgres:
    image: pgvector/pgvector:pg15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 8877
      POSTGRES_DB: spherevoice_dev
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.2-alpine
    ports:
      - "6382:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      APP_NAME: SphereVoice
      ENVIRONMENT: development
      DATABASE_URL: postgresql+asyncpg://postgres:8877@postgres:5432/spherevoice_dev
      REDIS_URL: redis://redis:6379
      CELERY_BROKER_BACKEND: redis
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      JWT_SECRET_KEY: dev-secret-change-in-production
      JWT_ALGORITHM: HS256
      ENCRYPTION_KEY: ZGV2LWVuY3J5cHRpb24ta2V5LTMyLWJ5dGVzISE=
      AZURE_STORAGE_CONNECTION_STRING: ""
      SENTRY_DSN: ""
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4318"
      LIVEKIT_URL: ws://localhost:7880
      LIVEKIT_API_KEY: devkey
      LIVEKIT_API_SECRET: devsecret
      DEMO_MODE: "true"
      AUTO_SEED_PROVIDERS: "true"
      REQUIRE_API_KEYS: "false"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    ports:
      - "3003:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next

  celery-worker:
    build: ./backend
    command: celery -A app.workers.celery_app worker --loglevel=info
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:8877@postgres:5432/spherevoice_dev
      REDIS_URL: redis://redis:6379
      CELERY_BROKER_BACKEND: redis
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      JWT_SECRET_KEY: dev-secret-change-in-production
      ENCRYPTION_KEY: ZGV2LWVuY3J5cHRpb24ta2V5LTMyLWJ5dGVzISE=
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── Observability Stack ─────────────────────────────────────
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.108.0
    command: [ "--config=/etc/otel-collector-config.yml" ]
    volumes:
      - ./infra/otel/otel-collector-config.yml:/etc/otel-collector-config.yml
    ports:
      - "4317:4317" # OTLP gRPC
      - "4318:4318" # OTLP HTTP
      - "8889:8889" # Prometheus metrics exporter
    depends_on:
      - prometheus

  prometheus:
    image: prom/prometheus:v2.54.1
    volumes:
      - ./infra/otel/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./infra/otel/alerting-rules.yml:/etc/prometheus/alerting-rules.yml
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=15d"
      - "--web.enable-lifecycle"

  grafana:
    image: grafana/grafana:11.2.0
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: SphereVoice-dev-grafana
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infra/otel/grafana-datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml
      - ./infra/grafana/provisioning/dashboards/dashboards.yml:/etc/grafana/provisioning/dashboards/dashboards.yml
      - ./infra/grafana/dashboards:/var/lib/grafana/dashboards
    depends_on:
      - prometheus
      - loki

  loki:
    image: grafana/loki:3.2.0
    command: [ "-config.file=/etc/loki/loki.yml" ]
    volumes:
      - ./infra/otel/loki.yml:/etc/loki/loki.yml
      - loki_data:/loki
    ports:
      - "3100:3100" # Loki HTTP API
    healthcheck:
      test: [ "CMD-SHELL", "wget --quiet --tries=1 --output-document=- http://localhost:3100/ready | grep -q ready || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 5

  promtail:
    image: grafana/promtail:3.2.0
    command: [ "-config.file=/etc/promtail/promtail.yml" ]
    volumes:
      - ./infra/otel/promtail.yml:/etc/promtail/promtail.yml
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    depends_on:
      loki:
        condition: service_healthy

  tempo:
    image: grafana/tempo:2.5.0
    command: [ "-config.file=/etc/tempo.yml" ]
    volumes:
      - ./infra/otel/tempo.yml:/etc/tempo.yml
      - tempo_data:/var/tempo
    ports:
      - "3200:3200" # Tempo HTTP
      - "4320:4317" # OTLP gRPC (Tempo)

volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data:
  tempo_data:
  loki_data: