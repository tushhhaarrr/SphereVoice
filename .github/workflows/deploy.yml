name: Deploy Production

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/deploy.yml"
      - ".github/workflows/ci.yml"
      - "backend/**"
      - "frontend/**"
      - "packages/**"
      - "infra/observability/**"
  workflow_dispatch: {}

concurrency:
  group: deploy-production
  cancel-in-progress: true

env:
  ACR_LOGIN_SERVER: SphereVoicegorillaaacr.azurecr.io
  RESOURCE_GROUP: SphereVoice-gorillaa
  BACKEND_APP: SphereVoice-backend
  CELERY_APP: SphereVoice-celery-worker
  FRONTEND_APP: SphereVoice-frontend
  FRONTEND_API_URL: https://api.SphereVoice.gorillaa.ai
  AZURE_KEY_VAULT_URL: https://SphereVoice-gorillaa-kv-ci.vault.azure.net/
  OBSERVABILITY_APP: SphereVoice-production-observability
  OTEL_ENDPOINT: http://SphereVoice-production-observability

jobs:
  # ─── Detect Changes ──────────────────────────────────────────
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      observability: ${{ steps.filter.outputs.observability }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
              - '.github/workflows/deploy.yml'
            frontend:
              - 'frontend/**'
              - 'packages/**'
              - '.github/workflows/deploy.yml'
            observability:
              - 'infra/observability/**'
              - '.github/workflows/deploy.yml'

  # ─── Build Backend (parallel) ────────────────────────────────
  build-backend:
    name: Build Backend
    needs: changes
    if: needs.changes.outputs.backend == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}
      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/Dockerfile.prod
          platforms: linux/amd64
          provenance: false
          push: true
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend
          tags: |
            ${{ env.ACR_LOGIN_SERVER }}/${{ env.BACKEND_APP }}:${{ github.sha }}
            ${{ env.ACR_LOGIN_SERVER }}/${{ env.BACKEND_APP }}:latest

  # ─── Build Frontend (parallel) ──────────────────────────────
  build-frontend:
    name: Build Frontend
    needs: changes
    if: needs.changes.outputs.frontend == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}
      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: frontend/Dockerfile
          platforms: linux/amd64
          provenance: false
          push: true
          build-args: |
            NEXT_PUBLIC_API_URL=${{ env.FRONTEND_API_URL }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend
          tags: |
            ${{ env.ACR_LOGIN_SERVER }}/${{ env.FRONTEND_APP }}:${{ github.sha }}
            ${{ env.ACR_LOGIN_SERVER }}/${{ env.FRONTEND_APP }}:latest

  # ─── Build Observability (parallel) ─────────────────────────
  build-observability:
    name: Build Observability
    needs: changes
    if: needs.changes.outputs.observability == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}
      - name: Build and push observability image
        uses: docker/build-push-action@v6
        with:
          context: ./infra/observability
          file: infra/observability/Dockerfile
          platforms: linux/amd64
          provenance: false
          push: true
          cache-from: type=gha,scope=observability
          cache-to: type=gha,mode=max,scope=observability
          tags: |
            ${{ env.ACR_LOGIN_SERVER }}/SphereVoice-observability:${{ github.sha }}
            ${{ env.ACR_LOGIN_SERVER }}/SphereVoice-observability:latest

  # ─── Deploy ──────────────────────────────────────────────────
  deploy:
    name: Deploy
    needs: [changes, build-backend, build-frontend, build-observability]
    if: always() && !cancelled() && !contains(needs.*.result, 'failure')
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Log in to ACR (for migrations)
        if: needs.build-backend.result == 'success'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Run database migrations
        if: needs.build-backend.result == 'success'
        run: |
          docker run --rm \
            -e DATABASE_URL="${{ secrets.DATABASE_URL }}" \
            -e ENCRYPTION_KEY="${{ secrets.ENCRYPTION_KEY }}" \
            -e ENVIRONMENT="production" \
            "$ACR_LOGIN_SERVER/$BACKEND_APP:${GITHUB_SHA}" \
            alembic upgrade head

      - name: Update observability container app
        if: needs.build-observability.result == 'success'
        run: |
          az containerapp update \
            --name "$OBSERVABILITY_APP" \
            --resource-group "$RESOURCE_GROUP" \
            --image "$ACR_LOGIN_SERVER/SphereVoice-observability:${GITHUB_SHA}" \
            --set-env-vars \
              "BACKEND_METRICS_TARGET=SphereVoice-backend:80" \
            --output none

      - name: Update backend and worker container apps
        if: needs.build-backend.result == 'success'
        run: |
          az containerapp update \
            --name "$BACKEND_APP" \
            --resource-group "$RESOURCE_GROUP" \
            --image "$ACR_LOGIN_SERVER/$BACKEND_APP:${GITHUB_SHA}" \
            --set-env-vars \
              "AZURE_KEY_VAULT_URL=$AZURE_KEY_VAULT_URL" \
              "GLOBAL_PROVIDER_SECRETS_IN_KEY_VAULT=true" \
              "OTEL_EXPORTER_OTLP_ENDPOINT=$OTEL_ENDPOINT" \
              "OTEL_SERVICE_NAME=SphereVoice-backend" \
              "CELERY_BROKER_BACKEND=servicebus" \
              "AZURE_SERVICE_BUS_CONNECTION_STRING=${{ secrets.AZURE_SERVICE_BUS_CONNECTION_STRING }}" \
              "AZURE_SERVICE_BUS_QUEUE_PREFIX=SphereVoice" \
              "PLIVO_AUTH_ID=${{ secrets.PLIVO_AUTH_ID }}" \
              "PLIVO_AUTH_TOKEN=${{ secrets.PLIVO_AUTH_TOKEN }}" \
              "PLIVO_ZENTRUNK_TERMINATION_DOMAIN=${{ secrets.PLIVO_ZENTRUNK_TERMINATION_DOMAIN }}" \
              "PLIVO_ZENTRUNK_SIP_USERNAME=${{ secrets.PLIVO_ZENTRUNK_SIP_USERNAME }}" \
              "PLIVO_ZENTRUNK_SIP_PASSWORD=${{ secrets.PLIVO_ZENTRUNK_SIP_PASSWORD }}" \
              "PLIVO_OUTBOUND_NUMBERS=${{ secrets.PLIVO_OUTBOUND_NUMBERS }}" \
            --output none

          az containerapp update \
            --name "$CELERY_APP" \
            --resource-group "$RESOURCE_GROUP" \
            --image "$ACR_LOGIN_SERVER/$BACKEND_APP:${GITHUB_SHA}" \
            --set-env-vars \
              "AZURE_KEY_VAULT_URL=$AZURE_KEY_VAULT_URL" \
              "GLOBAL_PROVIDER_SECRETS_IN_KEY_VAULT=true" \
              "OTEL_EXPORTER_OTLP_ENDPOINT=$OTEL_ENDPOINT" \
              "OTEL_SERVICE_NAME=SphereVoice-celery-worker" \
              "CELERY_BROKER_BACKEND=servicebus" \
              "AZURE_SERVICE_BUS_CONNECTION_STRING=${{ secrets.AZURE_SERVICE_BUS_CONNECTION_STRING }}" \
              "AZURE_SERVICE_BUS_QUEUE_PREFIX=SphereVoice" \
              "PLIVO_AUTH_ID=${{ secrets.PLIVO_AUTH_ID }}" \
              "PLIVO_AUTH_TOKEN=${{ secrets.PLIVO_AUTH_TOKEN }}" \
            --output none

      - name: Update frontend container app
        if: needs.build-frontend.result == 'success'
        run: |
          az containerapp update \
            --name "$FRONTEND_APP" \
            --resource-group "$RESOURCE_GROUP" \
            --image "$ACR_LOGIN_SERVER/$FRONTEND_APP:${GITHUB_SHA}" \
            --output none

      - name: Verify deployment status
        run: |
          for app in "$BACKEND_APP" "$CELERY_APP" "$FRONTEND_APP" "$OBSERVABILITY_APP"; do
            az containerapp show \
              --name "$app" \
              --resource-group "$RESOURCE_GROUP" \
              --query '{name:name,latestRevisionName:properties.latestRevisionName,provisioningState:properties.provisioningState,runningStatus:properties.runningStatus}'
          done
