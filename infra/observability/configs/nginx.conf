# SphereVoice Observability — nginx reverse proxy
# Multiplexes all services through port 3000 (the only Container Apps ingress port)
#
# Routes:
#   /v1/          → OTEL Collector HTTP (4318) — trace/log/metric ingestion from backend
#   /loki/        → Loki HTTP API (3100)       — direct log push if needed
#   /prometheus/  → Prometheus HTTP (9090)      — API access
#   /             → Grafana UI (3001)           — dashboards

worker_processes 2;
error_log /dev/stderr warn;
pid /var/run/nginx.pid;

events {
    worker_connections 512;
}

http {
    access_log off;

    # Larger body for OTLP batches
    client_max_body_size 16m;

    # Timeouts for slow exporters
    proxy_connect_timeout 10s;
    proxy_read_timeout    30s;
    proxy_send_timeout    30s;

    upstream otel_http {
        server 127.0.0.1:4318;
    }

    upstream grafana {
        server 127.0.0.1:3001;
    }

    upstream loki {
        server 127.0.0.1:3100;
    }

    upstream prometheus {
        server 127.0.0.1:9090;
    }

    server {
        listen 3000;
        server_name _;

        # ── Health check (Container Apps) ──────────────────
        location = /healthz {
            access_log off;
            default_type text/plain;
            return 200 "ok";
        }

        # ── OTLP HTTP ingestion ───────────────────────────
        # Backend SDKs POST to /v1/traces, /v1/logs, /v1/metrics
        location /v1/ {
            proxy_pass http://otel_http;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # ── Loki push API (direct access) ──────────────────
        location /loki/ {
            proxy_pass http://loki/;
            proxy_set_header Host $host;
        }

        # ── Prometheus API ─────────────────────────────────
        location /prometheus/ {
            proxy_pass http://prometheus/;
            proxy_set_header Host $host;
        }

        # ── Grafana UI (default — everything else) ─────────
        location / {
            proxy_pass http://grafana;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            # WebSocket support for Grafana Live
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}
