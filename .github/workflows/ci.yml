name: CI

on:
  push:
    branches: [main, staging, dev]
  pull_request:
    branches: [main, staging, dev]

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20.18"
  PYTHON_VERSION: "3.11.11"
  PNPM_VERSION: "9.15.4"

jobs:
  # ─── Detect Changes ───────────────────────────────────────────
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      backend_python_files: ${{ steps.filter.outputs.backend_python_files }}
      backend_app_python_files: ${{ steps.filter.outputs.backend_app_python_files }}
      frontend: ${{ steps.filter.outputs.frontend }}
      infra: ${{ steps.filter.outputs.infra }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          base: ${{ github.event_name == 'pull_request' && github.base_ref || github.event.before }}
          ref: ${{ github.sha }}
          list-files: shell
          filters: |
            backend:
              - 'backend/**'
            backend_python:
              - 'backend/**/*.py'
            backend_app_python:
              - 'backend/app/**/*.py'
            frontend:
              - 'frontend/**'
              - 'packages/**'
            infra:
              - 'infra/**'

  # ─── Backend ──────────────────────────────────────────────────
  backend-lint:
    name: Backend Lint
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt
      - name: Ruff lint
        if: needs.changes.outputs.backend_python_files != ''
        run: |
          cd backend
          ruff check ${{ needs.changes.outputs.backend_python_files }}
      - name: Ruff format check
        if: needs.changes.outputs.backend_python_files != ''
        run: |
          cd backend
          ruff format --check ${{ needs.changes.outputs.backend_python_files }}
      - name: Import boundary check
        run: |
          cd backend
          lint-imports

  backend-test:
    name: Backend Tests
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg15
        env:
          POSTGRES_USER: SphereVoice
          POSTGRES_PASSWORD: SphereVoice_test
          POSTGRES_DB: SphereVoice_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U SphereVoice"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7.2-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql+asyncpg://SphereVoice:SphereVoice_test@localhost:5432/SphereVoice_test
      REDIS_URL: redis://localhost:6379/0
      JWT_SECRET_KEY: test-secret-key-ci
      ENCRYPTION_KEY: dGVzdC1lbmNyeXB0aW9uLWtleS0zMmI=
      ENVIRONMENT: test
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt
      - name: Run tests
        run: |
          cd backend
          PYTHONPATH=. pytest --cov=app --cov-report=xml --cov-report=term-missing -v
      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage.xml

  backend-type-check:
    name: Backend Type Check
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt
      - name: Mypy
        if: needs.changes.outputs.backend_app_python_files != ''
        run: |
          cd backend
          mypy ${{ needs.changes.outputs.backend_app_python_files }} --ignore-missing-imports

  # ─── Frontend ─────────────────────────────────────────────────
  frontend-lint:
    name: Frontend Lint
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Lint
        run: |
          cd frontend
          pnpm lint

  frontend-type-check:
    name: Frontend Type Check
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Type check
        run: |
          cd frontend
          pnpm type-check

  frontend-build:
    name: Frontend Build
    needs: [frontend-lint, frontend-type-check]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build
        run: |
          cd frontend
          pnpm build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000

  # ─── Docker ───────────────────────────────────────────────────
  docker-build:
    name: Docker Build Check
    needs: changes
    if: needs.changes.outputs.backend == 'true' || needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - service: backend
            context: .
            dockerfile: backend/Dockerfile.prod
          - service: frontend
            context: ./frontend
            dockerfile: frontend/Dockerfile
    steps:
      - uses: actions/checkout@v4
        with:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build ${{ matrix.service }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NEXT_PUBLIC_API_URL=http://localhost:8000

  # ─── Terraform ────────────────────────────────────────────────
  terraform-validate:
    name: Terraform Validate
    needs: changes
    if: needs.changes.outputs.infra == 'true'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        environment: [dev, staging, production]
    defaults:
      run:
        working-directory: infra/terraform/environments/${{ matrix.environment }}
    steps:
      - uses: actions/checkout@v4
        with:
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.0"
      - name: Terraform Init
        run: terraform init -backend=false
      - name: Terraform Validate
        run: terraform validate
      - name: Terraform Format Check
        run: terraform fmt -check -recursive
