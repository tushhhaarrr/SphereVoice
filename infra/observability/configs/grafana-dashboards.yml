# Grafana Dashboard Provisioning — Production
apiVersion: 1

providers:
  - name: SphereVoice
    orgId: 1
    folder: SphereVoice
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
