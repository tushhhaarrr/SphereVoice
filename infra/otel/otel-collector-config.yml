# OpenTelemetry Collector Configuration for SphereVoice
# Receives traces + logs from the backend, exports to Tempo + Prometheus + Loki

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: "0.0.0.0:4317"
      http:
        endpoint: "0.0.0.0:4318"

processors:
  batch:
    send_batch_size: 1024
    timeout: 5s

  memory_limiter:
    check_interval: 5s
    limit_mib: 256
    spike_limit_mib: 64

exporters:
  # Export traces to Grafana Tempo
  otlp/tempo:
    endpoint: "tempo:4317"
    tls:
      insecure: true

  # Export metrics for Prometheus scraping
  prometheus:
    endpoint: "0.0.0.0:8889"
    namespace: SphereVoice

  # Export logs to Loki
  loki:
    endpoint: "http://loki:3100/loki/api/v1/push"

  # Debug logging (disable in production)
  debug:
    verbosity: basic

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [otlp/tempo, debug]
    metrics:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [prometheus]
    logs:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [loki]
