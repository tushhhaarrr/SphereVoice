# Prometheus Configuration for SphereVoice

global:
  scrape_interval: 15s
  evaluation_interval: 15s

# ── Alerting Rules ──────────────────────────────────────────
rule_files:
  - "/etc/prometheus/alerting-rules.yml"

scrape_configs:
  # Scrape metrics from OpenTelemetry Collector
  - job_name: "otel-collector"
    static_configs:
      - targets: ["otel-collector:8889"]
        labels:
          service: "SphereVoice-otel-collector"

  # Scrape business metrics from SphereVoice Backend
  - job_name: "SphereVoice-backend"
    metrics_path: /metrics
    scrape_interval: 10s
    static_configs:
      - targets: ["backend:8000"]
        labels:
          service: "SphereVoice-backend"

  # Scrape Prometheus own metrics
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
